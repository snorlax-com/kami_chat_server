org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=3G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# ビルド速度優先の設定（PC負荷が上がります）
org.gradle.parallel=true
org.gradle.workers.max=6
org.gradle.daemon=true
# configure-on-demand は Flutter プラグイン（camera_android など）の評価順序で
# `flutter.compileSdkVersion` が未定義になることがあるため無効化
org.gradle.configureondemand=false
org.gradle.caching=true
org.gradle.vfs.watch=true
