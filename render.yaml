# Render Blueprint: モノレポから kami_chat_server のみデプロイ
# https://render.com/docs/monorepo-support#setting-a-root-directory
#
# 実機アプリ（Flutter）は kami_chat_server の POST /api/chat/send を前提とする。
# Root Directory を auraface-chat-mail-bridge にすると別実装が動き、至急/通常の件名が
# 一致しないなどの不整合が起きうる。本 Blueprint は rootDir: kami_chat_server のみ。
#
# ダッシュボードで既存サービスがある場合:
#   Settings → Root Directory → kami_chat_server に変更して手動デプロイ
#
services:
  - type: web
    name: kami-chat-server
    runtime: node
    rootDir: kami_chat_server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # 公開サービスURL（返信リンク用）。ダッシュボードのみ運用の場合も同値を設定してください。
      - key: BASE_URL
        value: https://kami-chat-server.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      # 任意。設定時は主通知先として ADMIN_EMAIL より優先（resolveConsultationNotificationRecipients）。
      # - key: DEV_NOTIFICATION_EMAIL
      #   sync: false
      # 任意。至急（priority_guidance）の第2宛先。未設定時は emergencyauraface@gmail.com。
      # - key: EMERGENCY_NOTIFICATION_EMAIL
      #   sync: false
      # 任意。種別ごとに主宛先だけ上書き（未設定時は DEV → ADMIN）。
      # - key: MAIL_TO_PRIORITY
      #   sync: false
      # - key: MAIL_TO_NORMAL
      #   sync: false
      - key: MAIL_FROM
        sync: false
      - key: TOKEN_SECRET
        sync: false
      # Firebase Admin（ID トークン検証）。ダッシュボードまたは npm run render:upsert-firebase-b64 で設定。
      - key: FIREBASE_SERVICE_ACCOUNT_JSON_B64
        sync: false
      # 至急を JST で時間帯限定する場合のみ追加（両方セット）。未設定なら 24 時間受付。
      # - key: CONSULTATION_URGENT_JST_HOUR_START
      #   value: "10"
      # - key: CONSULTATION_URGENT_JST_HOUR_END
      #   value: "23"
