name: Test

# push / PR のたびに実行（Render の On Commit デプロイと別に、ここでテスト）
on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos lib/ || true

      - name: Unit & Widget tests
        run: flutter test test/

      - name: Golden tests (no update)
        run: flutter test test/golden_test.dart

      - name: Web build
        run: flutter build web --release

  # kami_chat_server（Render 用 Node）。ローカル起動 → 送受信 + E2E
  kami_chat_server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kami_chat_server/package-lock.json

      - name: Install kami_chat_server deps
        working-directory: kami_chat_server
        run: npm ci

      - name: Start server & run API tests
        working-directory: kami_chat_server
        env:
          PORT: "3041"
          TOKEN_SECRET: ci_token_secret_for_github_actions_only
        run: |
          set -e
          node index.js &
          PID=$!
          for i in $(seq 1 40); do
            if curl -sf "http://127.0.0.1:${PORT}/health" >/dev/null; then break; fi
            sleep 0.25
          done
          curl -sf "http://127.0.0.1:${PORT}/health" >/dev/null
          node scripts/send-receive-send-test.js "http://127.0.0.1:${PORT}"
          BASE_URL="http://127.0.0.1:${PORT}" TOKEN_SECRET="${TOKEN_SECRET}" node scripts/e2e-full-flow-test.js
          kill $PID

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Install ChromeDriver
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          wget -q "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_${CHROME_VERSION%%.*}" -O /tmp/cv
          wget -q "https://chromedriver.storage.googleapis.com/$(cat /tmp/cv)/chromedriver_linux64.zip" -O /tmp/cd.zip
          unzip -o /tmp/cd.zip -d /tmp && sudo mv /tmp/chromedriver /usr/local/bin/ && chromedriver --version
        continue-on-error: true
      - name: Integration test (Chrome)
        run: |
          (chromedriver --port=4444 &)
          sleep 5
          flutter drive --driver=test_driver/integration_driver.dart --target=integration_test/app_test.dart -d web-server --web-port=8765 --browser-name=chrome || echo "Integration test skipped (ChromeDriver may be unavailable)"
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    needs: [flutter]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: flutter pub get && flutter build web --release
      - name: Install E2E deps
        working-directory: e2e
        run: |
          npm ci 2>/dev/null || npm install
          npx playwright install --with-deps chromium
      - name: Playwright E2E
        working-directory: e2e
        run: node run-e2e.js --ci --no-build
        env:
          BASE_URL: http://127.0.0.1:4173
