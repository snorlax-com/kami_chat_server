name: kami_face_oracle
description: Face-based deity reading app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  google_mlkit_face_detection: ^0.11.0
  image: ^4.2.0
  shared_preferences: ^2.2.2
  collection: ^1.18.0
  intl: ^0.19.0
  audioplayers: ^5.2.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_remote_config: ^5.1.3
  http: ^1.1.0
  fl_chart: ^0.66.2
  in_app_purchase: ^3.1.11
  tflite_flutter: ^0.11.0
  path_provider: ^2.1.1
  sensors_plus: ^6.0.0
  video_player: ^2.8.2
  flutter_riverpod: ^3.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  device_info_plus: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/legal/
    - assets/symbols/
    - assets/illustrations/
    - assets/sounds/
    - assets/sounds/meditation/
    - assets/characters/
    - assets/data/
    - assets/models/
    - assets/models/skin_condition_v2.tflite
    - assets/models/skin_analyzer_cpu.tflite
    - assets/models/face_type_classifier.tflite
    - assets/personality_type_mapping.json
    - assets/guides/
    - assets/videos/
    - assets/videos/opening_animation.mp4
    - assets/logos/
    - assets/icons/



